<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Vibe Music Icon Options</title>
<style>

<h1>Vibe Music Icon Options</h1>
<div class="card"><img src="icon1_v_orange.svg"><h3>Option 1</h3><p>橙色渐变 + 白色 V 字母</p></div>
<div class="card"><img src="icon2_v_dark.svg"><h3>Option 2</h3><p>深色背景 + 橙色 V + 声波条</p></div>
<div class="card"><img src="icon3_play_circle.svg"><h3>Option 3</h3><p>深色背景 + 橙色播放圆环</p></div>
<div class="card"><img src="icon4_v_stroke.svg"><h3>Option 4</h3><p>极简橙色 + 白色 V 描边</p></div>
