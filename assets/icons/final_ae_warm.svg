<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="35" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.45 0 0 0  0 0 0.15 0 0  0 0 0 0.7 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFB07A"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="#0D0D0D"/>
  <text x="512" y="500" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-weight="900"
        font-size="500" letter-spacing="-16" fill="#FF7A40"
        filter="url(#glow)">V</text>
  <rect x="248" y="820" width="46" height="56"  rx="23" fill="url(#bar)" opacity="0.40"/>
  <rect x="336" y="795" width="46" height="81"  rx="23" fill="url(#bar)" opacity="0.55"/>
  <rect x="424" y="765" width="46" height="111" rx="23" fill="url(#bar)" opacity="0.75"/>
  <rect x="512" y="745" width="46" height="131" rx="23" fill="url(#bar)" opacity="1.0"/>
  <rect x="600" y="765" width="46" height="111" rx="23" fill="url(#bar)" opacity="0.75"/>
  <rect x="688" y="795" width="46" height="81"  rx="23" fill="url(#bar)" opacity="0.55"/>
  <rect x="776" y="820" width="46" height="56"  rx="23" fill="url(#bar)" opacity="0.40"/>
</svg>
