<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Vibe Music Icon Options - Style 2</title>
<style>
body { background: #1a1a2e; color: white; font-family: Arial; display: flex; flex-wrap: wrap; gap: 20px; padding: 32px; justify-content: center; }
.card { background: #16213e; border-radius: 16px; padding: 20px; text-align: center; width: 240px; cursor: pointer; transition: transform 0.2s; }
.card:hover { transform: scale(1.05); border: 2px solid #FF6B35; }
.card img { width: 180px; height: 180px; border-radius: 36px; }
.card h3 { margin: 12px 0 6px; color: #FF6B35; font-size: 15px; }
.card p { color: #888; font-size: 12px; line-height: 1.4; }
h1 { text-align: center; width: 100%; color: #FF6B35; }
.tag { display: inline-block; background: #FF6B3522; color: #FF6B35; padding: 2px 8px; border-radius: 8px; font-size: 11px; margin: 4px 2px; }
</style></head><body>
<h1>Vibe Music - Icon Style 2 Variants</h1>

<div class="card"><img src="v2a_v_wave7.svg"><h3>A: 7 条声波</h3><p>经典声波柱，渐变透明度</p><span class="tag">渐变橙</span></div>

<div class="card"><img src="v2b_v_wave5.svg"><h3>B: 5 条宽柱</h3><p>白色 V + 橙金渐变柱</p><span class="tag">白字</span><span class="tag">宽间距</span></div>

<div class="card"><img src="v2c_v_wave_line.svg"><h3>C: 波浪线</h3><p>橙色 V + 双层波浪曲线</p><span class="tag">曲线</span><span class="tag">柔和</span></div>

<div class="card"><img src="v2d_v_dots.svg"><h3>D: 圆点律动</h3><p>白色 V + 大小渐变圆点</p><span class="tag">圆点</span><span class="tag">活泼</span></div>

<div class="card"><img src="v2e_v_glow.svg"><h3>E: 光晕</h3><p>橙色 V 带发光 + 声波柱</p><span class="tag">光效</span><span class="tag">科技感</span></div>

<div class="card"><img src="v2f_vibe_full.svg"><h3>F: VIBE 全称</h3><p>白色 VIBE + 橙金声波柱</p><span class="tag">全称</span><span class="tag">品牌感</span></div>

</body></html>
