<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#1C1C3A"/>
    </linearGradient>
    <!-- V glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.42 0 0 0  0 0 0.21 0 0  0 0 0 0.6 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Bar gradient (bottom to top) -->
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF9F5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- V letter with glow -->
  <text x="512" y="565" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-weight="900"
        font-size="520" letter-spacing="-16" fill="#FF6B35"
        filter="url(#glow)">V</text>

  <!-- 7 symmetrical wave bars, centered at x=512 -->
  <!-- Spacing: 88px apart, centered group: 6 bars * 88 = 528, start at 512-264=248 -->
  <rect x="248" y="770" width="46" height="56"  rx="23" fill="url(#bar)" opacity="0.45"/>
  <rect x="336" y="745" width="46" height="81"  rx="23" fill="url(#bar)" opacity="0.60"/>
  <rect x="424" y="715" width="46" height="111" rx="23" fill="url(#bar)" opacity="0.78"/>
  <rect x="512" y="695" width="46" height="131" rx="23" fill="url(#bar)" opacity="1.0"/>
  <rect x="600" y="715" width="46" height="111" rx="23" fill="url(#bar)" opacity="0.78"/>
  <rect x="688" y="745" width="46" height="81"  rx="23" fill="url(#bar)" opacity="0.60"/>
  <rect x="776" y="770" width="46" height="56"  rx="23" fill="url(#bar)" opacity="0.45"/>
</svg>