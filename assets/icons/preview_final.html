<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Vibe Music - Final Icon</title>
<style>
body { background: #1a1a2e; color: white; font-family: Arial; display: flex; flex-wrap: wrap; gap: 28px; padding: 40px; justify-content: center; }
.card { background: #16213e; border-radius: 16px; padding: 24px; text-align: center; width: 280px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
.card:hover { transform: scale(1.05); border-color: #FF6B35; }
.card img { width: 220px; height: 220px; border-radius: 44px; }
.card h3 { margin: 14px 0 8px; color: #FF6B35; }
.card p { color: #aaa; font-size: 13px; line-height: 1.5; }
h1 { text-align: center; width: 100%; color: #FF6B35; }
.note { text-align: center; width: 100%; color: #666; font-size: 13px; margin-bottom: 16px; }
.tag { display: inline-block; background: #FF6B3520; color: #FF6B35; padding: 3px 10px; border-radius: 8px; font-size: 11px; margin: 4px 2px; }
</style></head><body>
<h1>Vibe Music - Final Icon</h1>
<p class="note">A 声波 + E 光晕，细节打磨版</p>

<div class="card">
  <img src="final_ae.svg">
  <h3>标准版</h3>
  <p>中等光晕强度，经典橙色</p>
  <span class="tag">平衡</span><span class="tag">推荐</span>
</div>

<div class="card">
  <img src="final_ae_warm.svg">
  <h3>暖色版</h3>
  <p>更强光晕，偏暖橙色调</p>
  <span class="tag">温暖</span><span class="tag">柔和</span>
</div>

<div class="card">
  <img src="final_ae_bright.svg">
  <h3>亮色版</h3>
  <p>最强光晕，背景稍亮</p>
  <span class="tag">醒目</span><span class="tag">科技</span>
</div>

</body></html>
